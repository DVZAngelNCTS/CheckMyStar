events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # -------------------------------
    # Upstream vers l'API .NET
    # -------------------------------
    upstream api {
        server checkmystar-api:8080;
    }

    # -------------------------------
    # HTTP (port 80)
    # - Sert le challenge Certbot
    # - Sert temporairement le site avant HTTPS
    # - Redirige ensuite vers HTTPS
    # -------------------------------
    server {
        listen 80;
        server_name neosoftware.fr www.neosoftware.fr;

        # Challenge Certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirection HTTP → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------
    # HTTPS (port 443)
    # -------------------------------
    server {
        listen 443 ssl;
        server_name neosoftware.fr www.neosoftware.fr;

        # Certificats générés par Certbot (dans Docker)
        ssl_certificate /etc/letsencrypt/live/neosoftware.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/neosoftware.fr/privkey.pem;

        # -------------------------------
        # 1) FRONTEND ANGULAR (STATIC)
        # -------------------------------
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # -------------------------------
        # 2) API .NET
        # -------------------------------
        location /api/ {
            proxy_pass http://api/api/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # -------------------------------
        # 3) SWAGGER UI
        # -------------------------------
        location /swagger/ {
            proxy_pass http://api/swagger/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # -------------------------------
        # 4) OPENAPI JSON
        # -------------------------------
        location /openapi/ {
            proxy_pass http://api/openapi/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
