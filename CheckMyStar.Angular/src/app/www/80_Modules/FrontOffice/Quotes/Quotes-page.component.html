<div class="d-flex flex-column flex-grow-1">
  <!-- Filtres -->
  <div class="d-flex flex-row">
    <div class="d-flex flex-column rounded p-4 flex-grow-1 bg-secondary-light">
      <app-front-quote-filter [loadingSearch]="loadingSearch" [loadingReset]="loadingReset" (filter)="onFilter($event)"></app-front-quote-filter>
    </div>
  </div>

  <!-- Contenu principal extensible -->
  <div class="d-flex flex-column flex-grow-1">
    <!-- Tableau extensible -->
    <div class="d-flex flex-column flex-grow-1">
      <div class="d-flex flex-column rounded p-4 flex-grow-1 overflow-auto bg-secondary-light">
        <app-table [columns]="columns" [data]="quotes"
          (detail)="onDetail($event)"
          (update)="onUpdate($event)"
          (delete)="onDelete($event)"
          (enabled)="toggleEnabled($event)"
          (openCreate)="onCreate()">
        </app-table>
      </div>
    </div>
  </div>
</div>

<app-popup
  [visible]="popupVisible"
  [title]="popupTitle"
  [confirmLabel]="'PopupSection.Validate' | translate"
  [cancelLabel]="'PopupSection.Cancel' | translate"
  [errorMessage]="popupError"
  [loading]="loading"
  (confirm)="onPopupConfirm()"
  (cancel)="onPopupCancel()"
  icon="bi bi-file-earmark-text">

  <ng-container *ngIf="popupMode === 'delete'">
    <p>{{ 'FrontQuoteListSection.DeleteAsk' | translate }} <strong>{{ selectedQuote?.reference }}</strong> ?</p>
  </ng-container>

  <ng-container *ngIf="popupMode === 'enabled'">
    <p>{{ (selectedQuote?.isActive ? 'FrontQuoteListSection.DisableAsk' : 'FrontQuoteListSection.EnableAsk') | translate }} <strong>{{ selectedQuote?.reference }}</strong> ?</p>
  </ng-container>
</app-popup>
