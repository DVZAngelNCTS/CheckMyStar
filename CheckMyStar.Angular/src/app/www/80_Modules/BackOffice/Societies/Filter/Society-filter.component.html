<div class="ms-3 w-100" (keydown.enter)="search()">
    <app-filter [loadingSearch]="loadingSearch" [loadingReset]="loadingReset" (searchClicked)="search()" (resetClicked)="reset()">
        <div class="d-flex flex-column" [formGroup]="form">
            <div class="d-flex flex-row flex-nowrap align-items-center row-fields">
                <app-field controlName="name" icon="bi bi-person" label="{{ 'SocietySection.Name' | translate }}" labelClass="w-6rem start fw-bold" labelTextPosition="start" controlClass="w-100">
                    <input type="text" class="form-control" formControlName="name">               
                </app-field>
                <app-field controlName="email" icon="bi bi-envelope-at" label="{{ 'SocietySection.Email' | translate }}" labelClass="w-6rem start fw-bold" labelTextPosition="start" controlClass="w-100">
                    <input type="text" class="form-control" formControlName="email">               
                </app-field>
                <app-field controlName="phone" icon="bi bi-telephone" label="{{ 'SocietySection.Phone' | translate }}" labelClass="w-7rem start fw-bold" labelTextPosition="start" controlClass="w-100">
                    <input type="text" class="form-control" formControlName="phone">               
                </app-field>
            </div>
            <div class="d-flex flex-row flex-nowrap align-items-center row-fields">
                <app-field controlName="address" icon="bi bi-envelope" label="{{ 'SocietySection.Address' | translate }}" labelClass="w-6rem start fw-bold" labelTextPosition="start" controlClass="w-100">
                    <input type="text" class="form-control" formControlName="address">               
                </app-field>            
            </div>                            
        </div>
    </app-filter>
</div>
