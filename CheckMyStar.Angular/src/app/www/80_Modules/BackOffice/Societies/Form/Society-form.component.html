<form [formGroup]="form" class="d-flex flex-row gap-2">
    <!-- ========== COLONNE INFORMATIONS ========== -->
    <div class="flex-grow-1 d-flex flex-column column-box">
        <h5 class="fw-bold mb-3">{{ 'SocietySection.Informations' | translate }}</h5>

        <!-- IDENTIFIER -->
        <app-field controlName="identifier" label="{{ 'SocietySection.Identifier' | translate }}" labelClass="w-10rem start fw-bold" labelTextPosition="start" controlClass="w-100" icon="bi bi-list-ol">
            <input type="text" digitsOnly class="form-control" formControlName="identifier" [readonly]="readonlyIdentifier" required>
        </app-field>

        <!-- NAME -->
        <app-field controlName="name" label="{{ 'SocietySection.Name' | translate }}" labelClass="w-10rem start fw-bold" labelTextPosition="start" controlClass="w-100" icon="bi bi-building">
            <input type="text" class="form-control" formControlName="name" required>
        </app-field>

        <!-- LOGO -->
        <app-field controlName="logoPath" label="{{ 'SocietySection.Logo' | translate }}" labelClass="w-10rem start fw-bold" labelTextPosition="start" controlClass="w-100" icon="bi bi-image">
            <div class="d-flex flex-column gap-2 w-100">
                <input type="file" class="form-control" accept="image/*" (change)="onLogoSelected($event)">
                <input type="text" class="form-control" formControlName="logoPath" [placeholder]="'SocietySection.LogoPathPlaceholder' | translate" readonly>
                <div *ngIf="logoPreviewUrl" class="d-flex flex-column gap-2">
                    <img [src]="logoPreviewUrl" alt="Society logo" class="rounded border" style="max-height: 80px; max-width: 220px; object-fit: contain;">
                    <button type="button" class="btn btn-outline-danger btn-sm align-self-start" (click)="clearLogoSelection()">
                        <i class="bi bi-trash"></i> {{ 'SocietySection.RemoveLogo' | translate }}
                    </button>
                </div>
            </div>
        </app-field>

        <!-- SIRET -->
        <app-field controlName="siretCode" label="{{ 'SocietySection.Siret' | translate }}" labelClass="w-10rem start fw-bold" labelTextPosition="start" controlClass="w-100" icon="bi bi-card-list">
            <input type="text" digitsOnly class="form-control" formControlName="siretCode" maxlength="14" [placeholder]="'SocietySection.SiretPlaceholder' | translate">
        </app-field>

        <!-- VAT NUMBER -->
        <app-field controlName="vatNumber" label="{{ 'SocietySection.VatNumber' | translate }}" labelClass="w-10rem start fw-bold" labelTextPosition="start" controlClass="w-100" icon="bi bi-receipt">
            <input type="text" class="form-control" formControlName="vatNumber" maxlength="22" [placeholder]="'SocietySection.VatNumberPlaceholder' | translate">
        </app-field>

        <!-- ADMIN INFORMATION -->
        <app-field controlName="legalInformation" label="{{ 'SocietySection.AdministrativeInformation' | translate }}" labelClass="w-10rem start fw-bold" labelTextPosition="start" controlClass="w-100" icon="bi bi-file-earmark-text">
            <textarea class="form-control" formControlName="legalInformation" rows="3" [placeholder]="'SocietySection.AdministrativeInformationPlaceholder' | translate"></textarea>
        </app-field>

        <!-- EMAIL -->
        <app-field controlName="email" label="{{ 'SocietySection.Email' | translate }}" labelClass="w-10rem start fw-bold" labelTextPosition="start" controlClass="w-100" icon="bi bi-envelope-at">
        <input type="text" class="form-control" formControlName="email" required>
        </app-field>
        
        <!-- PHONE -->
        <app-field controlName="phone" label="{{ 'SocietySection.Phone' | translate }}" labelClass="w-10rem start fw-bold" labelTextPosition="start" controlClass="w-100" icon="bi bi-telephone">
            <input type="text" class="form-control" formControlName="phone" required>
        </app-field>
    </div>

    <!-- ========== COLONNE ADRESSE ========== -->
    <div class="flex-grow-1 d-flex flex-column column-box" formGroupName="address">
        <h5 class="fw-bold mb-3">{{ 'SocietySection.Address' | translate }}</h5>

        <!-- SEARCH ADDRESS -->
        <app-address-autocomplete (addressSelected)="onAddressSelected($event)"></app-address-autocomplete>

        <!-- IDENTIFIER -->
        <app-field controlName="identifier" label="{{ 'AddressSection.Identifier' | translate }}" labelClass="w-8rem start fw-bold" labelTextPosition="start" controlClass="w-100" icon="bi bi-list-ol">
            <input type="text" digitsOnly class="form-control" formControlName="identifier" [readonly]="readonlyIdentifier" required>
        </app-field>

        <!-- NUMBER -->
        <app-field controlName="number" label="{{ 'AddressSection.Number' | translate }}" labelClass="w-8rem start fw-bold" labelTextPosition="start" controlClass="w-100" icon="bi bi-1-square">
            <input type="text" class="form-control" formControlName="number">
        </app-field>

        <!-- ADDRESS LINE -->
        <app-field controlName="addressLine" label="{{ 'AddressSection.AddressLine' | translate }}" labelClass="w-8rem start fw-bold" labelTextPosition="start" controlClass="w-100" icon="bi bi-geo-alt">
            <input type="text" class="form-control" formControlName="addressLine">
        </app-field>

        <!-- CITY -->
        <app-field controlName="city" label="{{ 'AddressSection.City' | translate }}" labelClass="w-8rem start fw-bold" labelTextPosition="start" controlClass="w-100" icon="bi bi-building">
            <input type="text" class="form-control" formControlName="city">
        </app-field>

        <!-- ZIP CODE -->
        <app-field controlName="zipCode" label="{{ 'AddressSection.ZipCode' | translate }}" labelClass="w-8rem start fw-bold" labelTextPosition="start" controlClass="w-100" icon="bi bi-mailbox">
            <input type="text" class="form-control" formControlName="zipCode">
        </app-field>

        <!-- REGION -->
        <app-field controlName="region" label="{{ 'AddressSection.Region' | translate }}" labelClass="w-8rem start fw-bold" labelTextPosition="start" controlClass="w-100" icon="bi bi-geo">
            <input type="text" class="form-control" formControlName="region">
        </app-field>

        <!-- COUNTRY -->
        <div formGroupName="country">
            <app-field controlName="identifier" label="{{ 'AddressSection.Country' | translate }}" labelClass="w-8rem start fw-bold" labelTextPosition="start" controlClass="w-100" icon="bi bi-globe">
                <select class="form-select" formControlName="identifier" (change)="onCountryChange($event)">
                <option *ngFor="let c of countries" [value]="c.identifier"> {{ c.name }} </option>
                </select>
            </app-field>
        </div>
    </div>
</form>
