<div class="ms-3 w-100" (keydown.enter)="search()">
  <app-filter [loadingSearch]="loadingSearch" [loadingReset]="loadingReset" (searchClicked)="search()" (resetClicked)="reset()">
    <div class="d-flex flex-column" [formGroup]="form">
      <div class="d-flex flex-row flex-nowrap align-items-center row-fields">
        <app-field controlName="invoiceNumber" icon="bi bi-receipt" label="{{ 'FrontInvoiceListSection.FilterInvoiceNumber' | translate }}" labelClass="w-14rem start fw-bold" labelTextPosition="start" controlClass="w-100">
          <input type="text" class="form-control" formControlName="invoiceNumber">
        </app-field>
        <app-field controlName="paymentStatusIdentifier" icon="bi bi-wallet2" label="{{ 'FrontInvoiceListSection.FilterPaymentStatus' | translate }}" labelClass="w-14rem start fw-bold" labelTextPosition="start" controlClass="w-100">
          <select class="form-select" formControlName="paymentStatusIdentifier">
            <option [ngValue]="null">{{ 'CommonSection.All' | translate }}</option>
            <option [ngValue]="1">{{ 'FrontInvoiceListSection.PaymentPending' | translate }}</option>
            <option [ngValue]="2">{{ 'FrontInvoiceListSection.PaymentPaid' | translate }}</option>
          </select>
        </app-field>
        <app-field controlName="isActive" icon="bi bi-toggle2-on" label="{{ 'FrontInvoiceListSection.FilterActive' | translate }}" labelClass="w-10rem start fw-bold" labelTextPosition="start" controlClass="w-100">
          <select class="form-select" formControlName="isActive">
            <option [ngValue]="null">{{ 'CommonSection.All' | translate }}</option>
            <option [ngValue]="true">{{ 'CommonSection.Yes' | translate }}</option>
            <option [ngValue]="false">{{ 'CommonSection.No' | translate }}</option>
          </select>
        </app-field>
      </div>
    </div>
  </app-filter>
</div>
