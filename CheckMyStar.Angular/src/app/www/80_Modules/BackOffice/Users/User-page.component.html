<div class="d-flex flex-column flex-grow-1">
  <!-- Filtres -->
  <div class="d-flex flex-row">
    <div class="d-flex flex-column rounded p-4 flex-grow-1 bg-secondary-light">
      <app-user-filter [loadingSearch]="loadingSearch" [loadingReset]="loadingReset" [societies]="societies" (filter)="onFilter($event)"></app-user-filter>
    </div>
  </div>

  <!-- Contenu principal extensible -->
  <div class="d-flex flex-column flex-grow-1">
    <!-- Tableau extensible -->
    <div class="d-flex flex-column flex-grow-1">
      <div class="d-flex flex-column rounded p-4 flex-grow-1 overflow-auto bg-secondary-light">
        <app-table [columns]="columns" [data]="users!" (update)="openUpdate($event)" (delete)="openDelete($event)" (enabled)="toggleEnabled($event)" [showDetail]="false" (openCreate)="openCreate()"></app-table>
      </div>
    </div>
  </div>
</div>

<app-popup [large]="true" [visible]="popupVisible" [title]="popupTitle" [confirmLabel]="popupConfirmLabel" [cancelLabel]="popupCancelLabel" [errorMessage]="popupError" [loading]="loading" (confirm)="onPopupConfirm()" (cancel)="onPopupCancel()" icon="bi bi-person">
  <!-- Contenu dynamique -->
  <ng-container *ngIf="popupMode === 'delete'">
    <p>{{ 'UserSection.DeleteAsk' | translate }} <strong>{{ selectedUser?.lastName }} {{ selectedUser?.firstName }}</strong> ?</p>
  </ng-container>

  <ng-container *ngIf="popupVisible">
    <ng-container *ngIf="popupMode === 'edit'">
      <app-user-form [user]="selectedUser" [readonlyIdentifier]="true" (createSociety)="openCreateSociety()"></app-user-form>
    </ng-container>
    <ng-container *ngIf="popupMode === 'create'">
      <app-user-form [readonlyIdentifier]="true" (createSociety)="openCreateSociety()" [createdSocietyId]="createdSocietyId"></app-user-form>
    </ng-container>
  </ng-container>
</app-popup>

<app-popup [large]="true" [visible]="popupSocietyVisible" [title]="popupSocietyTitle" [confirmLabel]="popupSocietyConfirmLabel" [cancelLabel]="popupSocietyCancelLabel" [errorMessage]="popupSocietyError" [loading]="loading" (confirm)="onCreateSocietyConfirmed()" (cancel)="onCreatePopupSocietyCancel()" icon="bi bi-building">
  <!-- Contenu dynamique -->
  <ng-container [class.d-none]="!popupVisible">
    <ng-container *ngIf="popupMode === 'create'">
      <app-society-form [readonlyIdentifier]="true"></app-society-form> 
    </ng-container>
  </ng-container>
</app-popup>
