<div class="d-flex flex-column flex-grow-1">
  <!-- Filtres -->
  <div class="d-flex flex-row">
    <div class="d-flex flex-column rounded p-4 flex-grow-1 bg-secondary-light">
      <app-address-filter [loadingSearch]="loadingSearch" [loadingReset]="loadingReset" [countries]="countries" (filter)="onFilter($event)"></app-address-filter>
    </div>
  </div>

<!-- Contenu principal extensible -->
  <div class="d-flex flex-column flex-grow-1">
    <!-- Tableau extensible -->
    <div class="d-flex flex-column flex-grow-1">
      <div class="d-flex flex-column rounded p-4 flex-grow-1 overflow-auto bg-secondary-light">
        <app-table [columns]="columns" [data]="addresses!" (update)="openUpdate($event)" (delete)="openDelete($event)" [showEnabled]="false" [showDetail]="false" (openCreate)="openCreate()"></app-table>
      </div>
    </div>
  </div>
</div>

<app-popup [visible]="popupVisible" [title]="popupTitle" [confirmLabel]="popupConfirmLabel" [cancelLabel]="popupCancelLabel" [errorMessage]="popupError" [loading]="loading" (confirm)="onPopupConfirm()" (cancel)="onPopupCancel()" icon="bi bi-envelope">
  <!-- Contenu dynamique -->
  <ng-container *ngIf="popupMode === 'delete'">
    <p>{{ 'AddressSection.DeleteAsk' | translate }} <strong>{{ selectedAddress?.number }} {{ selectedAddress?.addressLine }} {{ selectedAddress?.city }} {{ selectedAddress?.zipCode }} {{ selectedAddress?.region }} {{ selectedAddress?.country?.name }}</strong> ?</p>
  </ng-container>

  <ng-container *ngIf="popupVisible">
    <ng-container *ngIf="popupMode === 'edit'">
      <app-user-form [address]="selectedAddress" [readonlyIdentifier]="true"></app-user-form>
    </ng-container>
    <ng-container *ngIf="popupMode === 'create'">
      <app-user-form [readonlyIdentifier]="true"></app-user-form>
    </ng-container>
  </ng-container>
</app-popup>
